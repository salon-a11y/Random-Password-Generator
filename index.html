<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
   
    <div class="container">
        <h1>Random Password Generator</h1>
           <div class="input-box">
        <input type="text" placeholder="Create a Password" id="password">
        <button class="copy-btn">Copy</button>
    </div>
     <div class="leng">
        <span>Password Length:</span>
        <input type="number" id="length" min="6" max="12" value="8">
    </div> 
     <div class=" leng">
        <span>Include Symbol:</span>
        <input type="checkbox" id="symbol">
    </div>
    <div class="leng">
        <span>Include Number:</span>
        <input type="checkbox" id="number">
    </div>
    <div class=" leng ">
        <span>Include Lowercase letter:</span>
        <input type="checkbox" id="lower" >
    </div>
    <div class="leng">
        <span>Include Uppercase letter:</span>
        <input type="checkbox" id="upper">
    </div> 
        <button class="btn2">Password Generator</button>
    </div>
    <script src="./app.js"></script>
</body>
</html>
